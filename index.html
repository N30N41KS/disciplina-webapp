<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления выговорами</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Адаптация под темную/светлую тему Telegram */
        body { 
            background-color: var(--tg-theme-bg-color, #f8f9fa); 
            color: var(--tg-theme-text-color, #000);
            padding: 20px; 
        }
        .card { 
            border-radius: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            background-color: var(--tg-theme-secondary-bg-color, #fff);
        }
        .table { color: var(--tg-theme-text-color, #000); }
    </style>
</head>
<body>
    <div class="container">
        <div class="card p-4">
            <h2 class="text-center mb-4">🚨 Нарушители чата</h2>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Пользователь</th>
                            <th>Всего</th>
                            <th>Последняя причина</th>
                            <th>Дата</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for s in stats %}
                        <tr>
                            <td><strong>{{ s.name }}</strong></td>
                            <td><span class="badge bg-danger">{{ s.count }}</span></td>
                            <td>{{ s.reason }}</td>
                            <td><small class="text-muted">{{ s.date }}</small></td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
            {% if not stats %}
            <p class="text-center mt-3">Нарушителей пока нет. В чате порядок! ✅</p>
            {% endif %}
            
            <div class="text-center mt-4">
                <button class="btn btn-primary" onclick="Telegram.WebApp.close()">Закрыть панель</button>
            </div>
        </div>
    </div>
    <script>
        Telegram.WebApp.ready(); // Сообщаем Telegram, что страница загружена
    </script>
</body>
</html>
